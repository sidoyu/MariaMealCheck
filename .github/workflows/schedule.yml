name: Run Meal Check & Notify

on:
  schedule:
    - cron: "0 14 * * 0"  # 매주 일요일 23:00 KST (UTC+9) = 일 14:00 UTC
  workflow_dispatch:  # 수동 실행도 허용

jobs:
  run_script:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests selenium pandas numpy lxml webdriver-manager

      - name: Run Selenium Script
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          MAIL_USER_ID: ${{ secrets.MAIL_USER_ID }}
          MAIL_USER_PW: ${{ secrets.MAIL_USER_PW }}
          ALIGO_API_KEY: ${{ secrets.ALIGO_API_KEY }}
          ALIGO_USER_ID: ${{ secrets.ALIGO_USER_ID }}
          ALIGO_SENDER_KEY: ${{ secrets.ALIGO_SENDER_KEY }}
          ALIGO_SENDER: ${{ secrets.ALIGO_SENDER }}
          ALIGO_RECEIVERS: ${{ secrets.ALIGO_RECEIVERS }}
        run: python seleniumcrawling3.py

      - name: Commit updated latest_meal.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add latest_meal.json || true
          git diff --cached --quiet || git commit -m "🤖 latest_meal.json 자동 커밋"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
